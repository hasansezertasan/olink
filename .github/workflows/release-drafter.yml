name: Release Drafter
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write       # Mandatory: create/update draft release
      pull-requests: write  # Mandatory: autolabeler writes labels
    runs-on: ubuntu-latest
    steps:
      - name: Draft a Release
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          # Only update the draft release on push to main; PR events run autolabeler only.
          disable-releaser: ${{ github.event_name != 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
